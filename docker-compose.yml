services:
  servidor:
    container_name: document-query-api
    restart: always
    build: .
    init: true
    shm_size: "1gb"
    ports:
      - "${HOST_PORT:-9000}:${PORT:-9000}"
    env_file:
      - .env
    environment:
      PORT: ${PORT:-9000}
      NODE_ENV: ${NODE_ENV:-production}
      BROWSER_HEADLESS: ${BROWSER_HEADLESS:-true}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:$${PORT:-9000}/api || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3
